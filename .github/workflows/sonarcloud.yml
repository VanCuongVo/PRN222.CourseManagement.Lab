name: SonarCloud
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin Sonar Analysis
        run: |
          dotnet sonarscanner begin \
            /k:"PRN222.CourseManagement.Lab" \
            /o:"VoVanCuong" \
            /d:sonar.branch.name=main \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

      - name: Restore Solution
        run: dotnet restore PRN222.CourseManagement.Repository.sln

      - name: Build Solution
        run: dotnet build PRN222.CourseManagement.Repository.sln --no-restore

      - name: Test with coverage
        run: |
          dotnet test PRN222.CourseManagement.Repository.sln \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: End Sonar Analysis
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
